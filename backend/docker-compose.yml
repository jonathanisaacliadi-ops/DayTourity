services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner

    container_name: lokaguide-backend

    restart: unless-stopped

    ports:
      - "${PORT:-3000}:3000"

    env_file:
      - .env

    volumes:
      - uploads_data:/app/uploads

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

volumes:
  uploads_data:
    driver: local