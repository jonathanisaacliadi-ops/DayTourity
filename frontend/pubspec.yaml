name: lokaguide
description: Connect users with private tour guides for one-day activities.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  flutter_secure_storage: ^9.2.2
  http: ^1.2.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  socket_io_client: ^2.0.3+1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http_parser: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
